<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新发现 - Apple Music</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- SVG 滤镜 -->
  <svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position: absolute; overflow: hidden" color-interpolation-filters="sRGB">
    <defs id="svg-defs"></defs>
  </svg>

  <div class="app-wrapper">
    <!-- 左侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="currentColor"/>
          </svg>
          <span>Music</span>
        </div>

        <div class="search-sidebar">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
          <span>搜索</span>
        </div>

        <nav class="nav-menu">
          <a href="#" class="nav-item" data-section="home">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/></svg>
            <span>主页</span>
          </a>
          <a href="#" class="nav-item active" data-section="discover">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="currentColor"/></svg>
            <span>新发现</span>
          </a>
          <a href="#" class="nav-item" data-section="radio">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3.24 6.15C2.51 6.43 2 7.17 2 8v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8c0-1.11-.89-2-2-2H8.3l8.26-3.34L15.88 1 3.24 6.15zM7 20c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm13-8h-2v-2h-2v2H4V8h16v4z" fill="currentColor"/></svg>
            <span>广播</span>
          </a>
        </nav>
      </div>

      <div class="sidebar-bottom">
        <a href="#" class="open-in-app">
          <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z" fill="currentColor"/></svg>
          在"音乐"中打开
        </a>
        <button class="btn-login" id="btn-login">登录</button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content" id="main-content">
      <div class="content-scroll">
        <!-- 新发现标题 -->
        <h1 class="page-title">新发现</h1>

        <!-- 新增专辑 - 3大卡片 -->
        <section class="section-featured">
          <div class="featured-grid" id="featured-grid"></div>
        </section>

        <!-- 瞩目之星 -->
        <section class="section">
          <div class="section-header">
            <h2>瞩目之星</h2>
            <a href="#" class="see-all">›</a>
          </div>
          <div class="small-grid" id="stars-grid"></div>
        </section>

        <!-- 新歌精选 -->
        <section class="section">
          <div class="section-header">
            <h2>新歌精选</h2>
            <a href="#" class="see-all">›</a>
          </div>
          <div class="song-list" id="song-list"></div>
        </section>

        <!-- 本周新发行 -->
        <section class="section">
          <div class="section-header">
            <h2>本周新发行</h2>
            <a href="#" class="see-all">›</a>
          </div>
          <div class="small-grid" id="new-release-grid"></div>
        </section>

        <!-- 新发布 -->
        <section class="section">
          <div class="section-header">
            <h2>新发布</h2>
            <a href="#" class="see-all">›</a>
          </div>
          <div class="small-grid" id="new-posts-grid"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- 底部播放栏 -->
  <div class="player-bar" id="player-bar">
    <div class="player-bar-inner">
      <div class="player-controls-left">
        <button class="player-btn" id="btn-prev">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="currentColor"/></svg>
        </button>
        <button class="player-btn play-btn" id="btn-play">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
        </button>
        <button class="player-btn" id="btn-next">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" fill="currentColor"/></svg>
        </button>
      </div>

      <div class="player-track">
        <div class="track-cover" id="track-cover">
          <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=40&h=40&fit=crop" alt="cover" />
        </div>
        <div class="track-info">
          <div class="track-name" id="track-name">THE RULES</div>
          <div class="track-artist" id="track-artist">XLOV - 1.God</div>
        </div>
      </div>

      <div class="player-progress">
        <div class="progress-bar-mini" id="progress-bar-mini">
          <div class="progress-fill-mini" id="progress-fill-mini"></div>
        </div>
      </div>

      <div class="player-controls-right">
        <button class="player-btn" title="歌词">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 3h18v2H3V3zm0 4h12v2H3V7zm0 4h18v2H3v-2zm0 4h12v2H3v-2z" fill="currentColor"/></svg>
        </button>
        <button class="player-btn" title="更多">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/></svg>
        </button>
        <button class="player-btn" title="音量">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 液态玻璃参数控制面板 -->
  <div class="glass-panel" id="glass-panel">
    <div class="glass-panel-header">
      <span>液态玻璃参数</span>
      <button class="glass-panel-close" id="glass-panel-close">&times;</button>
    </div>
    <div class="glass-panel-body">
      <div class="gc-group"><label>圆角半径 <span id="gv-radius">60px</span></label><input type="range" id="gs-radius" min="8" max="100" value="60" /></div>
      <div class="gc-group"><label>玻璃厚度 <span id="gv-thickness">80</span></label><input type="range" id="gs-thickness" min="10" max="200" value="80" /></div>
      <div class="gc-group"><label>边框宽度 <span id="gv-bezel">60</span></label><input type="range" id="gs-bezel" min="2" max="60" value="60" /></div>
      <div class="gc-group"><label>折射率 <span id="gv-ior">3.00</span></label><input type="range" id="gs-ior" min="1.0" max="3.0" step="0.05" value="3.0" /></div>
      <div class="gc-group"><label>缩放比 <span id="gv-scale">1.00</span></label><input type="range" id="gs-scale" min="0.0" max="2.0" step="0.05" value="1.0" /></div>
      <div class="gc-group"><label>模糊量 <span id="gv-blur">0.3</span></label><input type="range" id="gs-blur" min="0" max="8" step="0.1" value="0.3" /></div>
      <div class="gc-group"><label>高光透明度 <span id="gv-spec-opacity">0.50</span></label><input type="range" id="gs-spec-opacity" min="0" max="1" step="0.05" value="0.5" /></div>
      <div class="gc-group"><label>高光饱和度 <span id="gv-spec-sat">4</span></label><input type="range" id="gs-spec-sat" min="0" max="12" step="1" value="4" /></div>
      <div class="gc-group"><label>内阴影模糊 <span id="gv-shadow-blur">20px</span></label><input type="range" id="gs-shadow-blur" min="0" max="40" value="20" /></div>
      <div class="gc-group"><label>内阴影扩散 <span id="gv-shadow-spread">-5px</span></label><input type="range" id="gs-shadow-spread" min="-15" max="10" value="-5" /></div>
      <div class="gc-group"><label>着色透明度 <span id="gv-tint">6%</span></label><input type="range" id="gs-tint" min="0" max="40" value="6" /></div>
      <div class="gc-group"><label>外阴影模糊 <span id="gv-outer-shadow">24px</span></label><input type="range" id="gs-outer-shadow" min="0" max="50" value="24" /></div>
      <button class="gc-reset" id="gc-reset">重置全部</button>
    </div>
  </div>

  <!-- 右下角控制面板入口 -->
  <button class="glass-entry" id="glass-entry" title="液态玻璃参数">
    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z" fill="currentColor"/></svg>
  </button>

  <script src="script.js"></script>
</body>
</html>
